# Debezium Server Configuration for Spike
# Captures changes from PostgreSQL outbox tables and publishes to RabbitMQ

# Sink Configuration - RabbitMQ
debezium.sink.type=rabbitmq
debezium.sink.rabbitmq.connection.host=rabbitmq
debezium.sink.rabbitmq.connection.port=5672
debezium.sink.rabbitmq.connection.username=volleyer_user
debezium.sink.rabbitmq.connection.password=volleyer_password_dev
debezium.sink.rabbitmq.routingKey.field=eventType

# Source Configuration - PostgreSQL
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.offset.storage.file.filename=data/offsets.dat
debezium.source.offset.flush.interval.ms=0

# Database Connection
debezium.source.database.hostname=postgres
debezium.source.database.port=5432
debezium.source.database.user=volleyer_user
debezium.source.database.password=volleyer_password_dev
debezium.source.database.dbname=volleyer_events
debezium.source.database.server.name=events
debezium.source.table.include.list=public.outbox_messages
debezium.source.plugin.name=pgoutput

# Outbox Event Router Transform
debezium.transforms=outbox
debezium.transforms.outbox.type=io.debezium.transforms.outbox.EventRouter
debezium.transforms.outbox.table.field.event.key=id
debezium.transforms.outbox.table.field.event.payload=payload
debezium.transforms.outbox.route.by.field=routing_key
