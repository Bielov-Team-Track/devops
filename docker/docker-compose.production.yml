services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - volleyer-network
    # No depends_on — Caddy returns 502 for unavailable upstreams until they start.
    # This also avoids pulling all service images on first deploy.
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

  postgres:
    restart: unless-stopped
    env_file: .env.common
    ports:
      - "127.0.0.1:5432:5432"
      - "10.10.0.2:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volleyer_user"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    env_file: .env.common
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    restart: unless-stopped
    ports:
      - "10.10.0.2:15692:15692"
    env_file: .env.common
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  auth-service:
    restart: unless-stopped
    ports:
      - "10.10.0.2:15005:15005"
    env_file: [.env.common, .env.auth]
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  events-service:
