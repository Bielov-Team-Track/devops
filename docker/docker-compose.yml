services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-volleyer_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    networks:
      - volleyer-network
    command: postgres -c wal_level=logical -c max_replication_slots=4 -c max_wal_senders=4
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volleyer_user"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    networks:
      - volleyer-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  rabbitmq:
    image: rabbitmq:3-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?RABBITMQ_DEFAULT_USER must be set}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS must be set}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - volleyer-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  debezium:
    image: debezium/server:2.7
    volumes:
      - ./debezium:/debezium/conf
      - debezium_data:/debezium/data
    networks:
      - volleyer-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  auth-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-owner}/volleyer-auth-service:${TAG:?TAG variable must be set}
    networks:
      - volleyer-network
    depends_on:
      postgres:
        condition: service_healthy

  events-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-owner}/volleyer-events-service:${TAG:?TAG variable must be set}
    networks:
      - volleyer-network
    depends_on:
      postgres:
        condition: service_healthy

  clubs-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-owner}/volleyer-clubs-service:${TAG:?TAG variable must be set}
    networks:
      - volleyer-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  profiles-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-owner}/volleyer-profiles-service:${TAG:?TAG variable must be set}
    networks:
      - volleyer-network
    depends_on:
      postgres:
        condition: service_healthy

  messages-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-owner}/volleyer-messages-service:${TAG:?TAG variable must be set}
    networks:
      - volleyer-network
    depends_on:
      postgres:
        condition: service_healthy

  notifications-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-owner}/volleyer-notifications-service:${TAG:?TAG variable must be set}
    networks:
      - volleyer-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  social-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-owner}/volleyer-social-service:${TAG:?TAG variable must be set}
    networks:
      - volleyer-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  coaching-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-owner}/volleyer-coaching-service:${TAG:?TAG variable must be set}
    networks:
      - volleyer-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payments-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-owner}/volleyer-payments-service:${TAG:?TAG variable must be set}
    networks:
      - volleyer-network
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-owner}/volleyer-frontend:${TAG:?TAG variable must be set}
    networks:
      - volleyer-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  debezium_data:

networks:
  volleyer-network:
    driver: bridge
