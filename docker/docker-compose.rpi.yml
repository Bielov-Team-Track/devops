# Raspberry Pi overrides: lower resource limits for 8GB RAM device
services:
  postgres:
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  redis:
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  rabbitmq:
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

