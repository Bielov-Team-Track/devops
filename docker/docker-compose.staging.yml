# Staging environment overrides — lower resource limits for Pi/staging server.
# Caddy port 80 only. HTTPS terminated at Cloudflare (Full mode).
# Must be used with base: docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d
services:
  mailpit:
    image: axllent/mailpit:v1.29.4
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 100
      MP_MAX_AGE: 1h
    ports:
      - "127.0.0.1:8025:8025"
    networks:
      - volleyer-network
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - volleyer-network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

  postgres:
    restart: unless-stopped
    env_file: .env.common
    ports:
      - "127.0.0.1:5432:5432"
      - "10.10.0.3:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U volleyer_user"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    restart: unless-stopped
    env_file: .env.common
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    restart: unless-stopped
    env_file: .env.common
    ports:
      - "10.10.0.3:15692:15692"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  auth-service:
    restart: unless-stopped
    env_file: [.env.common, .env.auth]
    ports:
      - "10.10.0.3:15005:15005"
    environment:
      RateLimiting__Login__PermitLimit: 100
      RateLimiting__Register__PermitLimit: 100
      RateLimiting__ForgotPassword__PermitLimit: 100
      RateLimiting__General__PermitLimit: 1000
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    depends_on:
      mailpit:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  events-service:
    restart: unless-stopped
    env_file: [.env.common, .env.events]
    ports:
      - "10.10.0.3:15010:15010"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  clubs-service:
    restart: unless-stopped
    env_file: [.env.common, .env.clubs]
    ports:
      - "10.10.0.3:15020:15020"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  profiles-service:
    restart: unless-stopped
    env_file: [.env.common, .env.profiles]
    ports:
      - "10.10.0.3:15170:15170"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  messages-service:
    restart: unless-stopped
    env_file: [.env.common, .env.messages]
    ports:
      - "10.10.0.3:15180:15180"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  notifications-service:
    restart: unless-stopped
    env_file: [.env.common, .env.notifications]
    ports:
      - "10.10.0.3:15030:15030"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    depends_on:
      mailpit:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  social-service:
    restart: unless-stopped
    env_file: [.env.common, .env.social]
    ports:
      - "10.10.0.3:15040:15040"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  coaching-service:
    restart: unless-stopped
    env_file: [.env.common, .env.coaching]
    ports:
      - "10.10.0.3:15060:15060"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  payments-service:
    restart: unless-stopped
    env_file: [.env.common, .env.payments]
    ports:
      - "10.10.0.3:15050:15050"
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.147.0
    container_name: volleyspike-otel-collector
    command: ['--config=/etc/otelcol/config.yml']
    volumes:
      - ./otel-collector/otel-collector-config.yml:/etc/otelcol/config.yml:ro
    environment:
      - GOMEMLIMIT=170MiB
      - DEPLOYMENT_ENVIRONMENT=staging
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
    networks:
      - volleyer-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    profiles: []
    restart: unless-stopped
    env_file: [.env.common, .env.frontend]
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alloy:
    image: grafana/alloy:v1.6.1
    container_name: volleyspike-alloy
    restart: unless-stopped
    command: ['run', '--server.http.listen-addr=0.0.0.0:12345', '/etc/alloy/config.alloy']
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    networks:
      - volleyer-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
