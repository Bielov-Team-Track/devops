    nginx:
        image: nginx:alpine
        container_name: volleyer-nginx
        ports:
            - "8000:8000"
        volumes:
            - ../nginx/nginx.Development.conf:/etc/nginx/nginx.conf:ro
            - nginx_logs:/var/log/nginx
        networks:
            - volleyer_network
        restart: unless-stopped
