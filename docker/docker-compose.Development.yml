        ports:
            - "5051:5051" # gRPC
            - "5050:5050" # HTTP
            - "10008:10008" # Debugger
        volumes:
            - ../../microservices/payments-service:/app
        networks:
            - volleyer_network
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy

    otel-collector:
        image: otel/opentelemetry-collector-contrib:0.147.0
        container_name: otel-collector
        command: ['--config=/etc/otelcol/config.yml']
        volumes:
            - ./otel-collector-config.dev.yml:/etc/otelcol/config.yml:ro
        networks:
            - volleyer_network
        ports:
            - "127.0.0.1:4317:4317"
            - "127.0.0.1:4318:4318"
        deploy:
            resources:
                limits:
                    memory: 512M

    nginx:
        image: nginx:alpine
        container_name: volleyer-nginx
        ports:
            - "8000:8000"
        volumes:
            - ../nginx/nginx.Development.conf:/etc/nginx/nginx.conf:ro
            - nginx_logs:/var/log/nginx
        networks:
            - volleyer_network
        restart: unless-stopped
        depends_on:
            - postgres
            - auth-service
            - events-service
            - profiles-service
            - clubs-service
            - messages-service
            - notifications-service
            - social-service
            - payments-service
            - coaching-service

volumes:
    postgres_data:
        driver: local
    redis_data:
        driver: local
    rabbitmq_data:
        driver: local
    debezium_data:
        driver: local
    nginx_logs:
        driver: local

networks:
    volleyer_network:
        driver: bridge
