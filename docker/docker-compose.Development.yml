    postgres_data:
        driver: local
    pgadmin_data:
        driver: local
    redis_data:
        driver: local
    rabbitmq_data:
        driver: local
    debezium_data:
        driver: local
    nginx_logs:
        driver: local

networks:
    volleyer_network:
        driver: bridge
