version: "3.8"

services:
    postgres:
        image: postgres:15-alpine
        container_name: volleyer-postgres
        environment:
            POSTGRES_USER: volleyer_user
            POSTGRES_PASSWORD: volleyer_password_dev
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./init:/docker-entrypoint-initdb.d
        networks:
            - volleyer_network
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '2'
                    memory: 2G
                reservations:
                    cpus: '0.5'
                    memory: 512M
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U volleyer_user"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
        command: postgres -c wal_level=logical -c max_replication_slots=4 -c max_wal_senders=4

    redis:
        image: redis:7-alpine
        container_name: volleyer-redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - volleyer_network
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 256M
                reservations:
                    cpus: '0.1'
                    memory: 64M
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 3
        command: redis-server --appendonly yes

    rabbitmq:
        image: rabbitmq:3-management
        container_name: volleyer-rabbitmq
        ports:
            - "5672:5672" # AMQP
            - "15672:15672" # Management UI
        environment:
            RABBITMQ_DEFAULT_USER: volleyer_user
            RABBITMQ_DEFAULT_PASS: volleyer_password_dev
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        networks:
            - volleyer_network
        restart: unless-stopped
        deploy:
            resources:
                limits:
                    cpus: '1'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 128M
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s

    debezium:
        image: debezium/server:2.4
        container_name: volleyer-debezium
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        volumes:
            - ./debezium:/debezium/conf
            - debezium_data:/debezium/data
        networks:
            - volleyer_network
        restart: unless-stopped

    auth-service:
        build:
            context: ../../microservices/auth-service
            dockerfile: Dockerfile.dev
        container_name: volleyer-auth-dev
        environment:
            - ASPNETCORE_ENVIRONMENT=Development
            - ASPNETCORE_URLS=http://+:5005
            - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
            - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
            - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
            - AWS_REGION=${AWS_REGION:-us-east-1}
            - DOTNET_RUNNING_IN_CONTAINER=true
        ports:
            - "5005:5005" # HTTP
            - "10000:10000" # Debugger
        volumes:
            - ../../microservices/auth-service:/app:cached
            # Mask host obj/bin folders to prevent conflicts with container builds
            - /app/Auth/obj
            - /app/Auth/bin
            - /app/Auth.Domain/obj
            - /app/Auth.Domain/bin
            - /app/Auth.Infrastructure/obj
            - /app/Auth.Infrastructure/bin
            - /app/Auth.Services/obj
            - /app/Auth.Services/bin
            - /app/Auth.Tests/obj
            - /app/Auth.Tests/bin
            - /app/shared/Shared/obj
            - /app/shared/Shared/bin
            - /app/shared/Shared.Messaging/obj
            - /app/shared/Shared.Messaging/bin
            - /app/shared/Shared.Messaging.Contracts/obj
            - /app/shared/Shared.Messaging.Contracts/bin
            - /app/shared/Shared.Contracts/obj
            - /app/shared/Shared.Contracts/bin
            - /app/shared/Shared.DataAccess/obj
            - /app/shared/Shared.DataAccess/bin
            - /app/shared/Shared.Logging/obj
            - /app/shared/Shared.Logging/bin
            - /app/shared/Shared.Microservices/obj
            - /app/shared/Shared.Microservices/bin
            - /app/shared/Shared.Services/obj
            - /app/shared/Shared.Services/bin
        networks:
            - volleyer_network
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy

    events-service:
        build:
