            - "10001:10001" # Debugger
        volumes:
            - ../../microservices/events-service:/app:cached
            # Mask host obj/bin folders to prevent conflicts with container builds
            - /app/Events/obj
            - /app/Events/bin
            - /app/Events.Domain/obj
            - /app/Events.Domain/bin
            - /app/Events.Application/obj
            - /app/Events.Application/bin
            - /app/Events.Infrastructure/obj
            - /app/Events.Infrastructure/bin
            - /app/Events.Tests/obj
            - /app/Events.Tests/bin
            - /app/shared/Shared/obj
            - /app/shared/Shared/bin
            - /app/shared/Shared.Contracts/obj
            - /app/shared/Shared.Contracts/bin
            - /app/shared/Shared.DataAccess/obj
            - /app/shared/Shared.DataAccess/bin
            - /app/shared/Shared.Logging/obj
            - /app/shared/Shared.Logging/bin
            - /app/shared/Shared.Messaging/obj
            - /app/shared/Shared.Messaging/bin
            - /app/shared/Shared.Messaging.Contracts/obj
            - /app/shared/Shared.Messaging.Contracts/bin
            - /app/shared/Shared.Microservices/obj
            - /app/shared/Shared.Microservices/bin
            - /app/shared/Shared.Services/obj
            - /app/shared/Shared.Services/bin
            - /app/shared/Shared.Tests/obj
            - /app/shared/Shared.Tests/bin
        networks:
            - volleyer_network
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy

