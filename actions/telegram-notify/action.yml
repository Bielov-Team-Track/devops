name: 'Telegram Notify'
description: 'Send a notification to Telegram'

inputs:
  bot-token:
    description: 'Telegram bot API token'
    required: true
  chat-id:
    description: 'Telegram chat/group ID'
    required: true
  status:
    description: 'Status: success, failure, cancelled'
    required: true
  environment:
    description: 'Deployment environment (staging/production)'
    required: false
    default: ''
  message:
    description: 'Custom message (overrides auto-generated)'
    required: false
    default: ''
  duration:
    description: 'Duration string (e.g., "3m 24s")'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Build notification message
      id: build-message
      shell: bash
      env:
        INPUT_STATUS: ${{ inputs.status }}
        INPUT_ENVIRONMENT: ${{ inputs.environment }}
        INPUT_MESSAGE: ${{ inputs.message }}
        INPUT_DURATION: ${{ inputs.duration }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_RUN_ID: ${{ github.run_id }}
        GITHUB_SHA: ${{ github.sha }}
        GITHUB_REF_NAME: ${{ github.ref_name }}
        GITHUB_ACTOR: ${{ github.actor }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
      run: |
        # HTML-escape user-controlled values to prevent injection into Telegram messages
        escape_html() { echo "$1" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'; }

        SHORT_SHA="${GITHUB_SHA:0:7}"
        SAFE_REF=$(escape_html "$GITHUB_REF_NAME")
        SAFE_ACTOR=$(escape_html "$GITHUB_ACTOR")
        RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

        if [ -n "$INPUT_MESSAGE" ]; then
          echo "message=$INPUT_MESSAGE" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        case "$INPUT_STATUS" in
          success)
            ICON="✅"
            TITLE="Build Succeeded"
            ;;
          failure)
            ICON="❌"
            TITLE="Build Failed"
            ;;
          cancelled)
            ICON="⚠️"
            TITLE="Build Cancelled"
            ;;
          deploy-started)
            ICON="🚀"
            TITLE="Deploy Started"
            ;;
          deploy-success)
            ICON="✅"
            TITLE="Deploy Succeeded"
            ;;
          deploy-failure)
            ICON="🔥"
            TITLE="Deploy Failed"
            ;;
          rollback)
            ICON="⏪"
            TITLE="Rollback"
            ;;
          *)
            ICON="ℹ️"
            TITLE="CI/CD"
            ;;
        esac

        ENV_LINE=""
        if [ -n "$INPUT_ENVIRONMENT" ]; then
          ENV_LINE="<b>Environment:</b> ${INPUT_ENVIRONMENT}"
        fi

        DURATION_LINE=""
        if [ -n "$INPUT_DURATION" ]; then
          DURATION_LINE="<b>Duration:</b> ${INPUT_DURATION}"
        fi

        MSG="${ICON} <b>${TITLE}</b>
        <b>Repo:</b> ${GITHUB_REPOSITORY}
        <b>Branch:</b> ${SAFE_REF}
        <b>Commit:</b> ${SHORT_SHA}
        <b>Author:</b> ${SAFE_ACTOR}
        ${ENV_LINE}
        ${DURATION_LINE}
        <a href=\"${RUN_URL}\">View Run</a>"

        # Remove empty lines from optional fields
        MSG=$(echo "$MSG" | sed '/^$/d' | sed '/^[[:space:]]*$/d')

        # Write to file to handle multiline
        echo "$MSG" > /tmp/telegram_message.txt
        echo "message_file=/tmp/telegram_message.txt" >> "$GITHUB_OUTPUT"

    - name: Send Telegram notification
      uses: appleboy/telegram-action@a77dd3e42f32216ac2df808866c70b5aa41e6e75 # v1.0.0
      with:
        to: ${{ inputs.chat-id }}
        token: ${{ inputs.bot-token }}
        format: html
        disable_web_page_preview: true
        message_file: ${{ steps.build-message.outputs.message_file || '' }}
        message: ${{ steps.build-message.outputs.message || '' }}
