name: 'Telegram Notify'
description: 'Send or edit a Telegram notification with CI/CD status'

inputs:
  bot-token:
    description: 'Telegram bot API token'
    required: true
  chat-id:
    description: 'Telegram chat/group ID'
    required: true
  status:
    description: 'Status: build-started, build-passed, build-failed, tests-started, tests-passed, tests-failed, tests-skipped, deploy-started, deploy-success, deploy-failure'
    required: true
  service-name:
    description: 'Service name (e.g., auth-service)'
    required: true
  environment:
    description: 'Deployment environment (staging/production)'
    required: false
    default: ''
  message-id:
    description: 'Existing message ID to edit (empty = send new message)'
    required: false
    default: ''
  duration:
    description: 'Duration string (e.g., "2m 14s")'
    required: false
    default: ''
  test-type:
    description: 'Test type label (e.g., "Unit", "Integration")'
    required: false
    default: ''
  tests-passed:
    description: 'Number of tests passed'
    required: false
    default: ''
  tests-failed:
    description: 'Number of tests failed'
    required: false
    default: ''
  tests-total:
    description: 'Total number of tests'
    required: false
    default: ''
  previous-lines:
    description: 'Previous message content lines to preserve (base64-encoded to avoid shell issues)'
    required: false
    default: ''

outputs:
  message-id:
    description: 'The sent/edited message ID for subsequent edits'
    value: ${{ steps.send.outputs.message_id }}
  message-lines:
    description: 'Current message content lines (base64-encoded) for passing to next step'
    value: ${{ steps.send.outputs.message_lines }}

runs:
  using: 'composite'
  steps:
    - name: Send or edit Telegram message
      id: send
      shell: bash
      env:
        TG_TOKEN: ${{ inputs.bot-token }}
        TG_CHAT_ID: ${{ inputs.chat-id }}
        TG_STATUS: ${{ inputs.status }}
        TG_SERVICE: ${{ inputs.service-name }}
        TG_ENV: ${{ inputs.environment }}
        TG_MESSAGE_ID: ${{ inputs.message-id }}
        TG_DURATION: ${{ inputs.duration }}
        TG_TEST_TYPE: ${{ inputs.test-type }}
        TG_TESTS_PASSED: ${{ inputs.tests-passed }}
        TG_TESTS_FAILED: ${{ inputs.tests-failed }}
        TG_TESTS_TOTAL: ${{ inputs.tests-total }}
        TG_PREV_LINES: ${{ inputs.previous-lines }}
        GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        set -euo pipefail

        # Mask the token in both raw and URL-concatenated forms to prevent leaking in logs
        echo "::add-mask::${TG_TOKEN}"
        echo "::add-mask::bot${TG_TOKEN}"

        # Sanitize inputs for Telegram HTML (prevent injection via special chars)
        TG_SERVICE=$(echo "$TG_SERVICE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
        TG_ENV=$(echo "$TG_ENV" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
        TG_TEST_TYPE=$(echo "$TG_TEST_TYPE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
        TG_DURATION=$(echo "$TG_DURATION" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')

        # Decode previous message lines if present
        PREV=""
        if [ -n "$TG_PREV_LINES" ]; then
          PREV=$(echo "$TG_PREV_LINES" | base64 -d)
        fi

        # Build the current status line based on status
        case "$TG_STATUS" in
          build-started)
            LINE="⏳ Building..."
            HEADER="🔨 <b>${TG_SERVICE}</b>"
            ;;
          build-passed)
            if [ -n "$TG_TESTS_PASSED" ]; then
              LINE="✅ Build · ${TG_TEST_TYPE}: ${TG_TESTS_PASSED} passed (${TG_DURATION})"
            else
              LINE="✅ Build (${TG_DURATION})"
            fi
            HEADER="🔨 <b>${TG_SERVICE}</b>"
            ;;
          build-failed)
            if [ -n "$TG_TESTS_FAILED" ] && [ "$TG_TESTS_FAILED" != "0" ]; then
              LINE="❌ Build · ${TG_TEST_TYPE}: ${TG_TESTS_FAILED} failed"
            else
              LINE="❌ Build failed"
            fi
            HEADER="❌ <b>${TG_SERVICE}</b>"
            ;;
          docker-started)
            LINE="⏳ Docker..."
            HEADER=""
            ;;
          docker-passed)
            LINE="✅ Docker (${TG_DURATION})"
            HEADER=""
            ;;
          docker-failed)
            LINE="❌ Docker failed"
            HEADER="❌ <b>${TG_SERVICE}</b>"
            ;;
          tests-started)
            LINE="⏳ ${TG_TEST_TYPE} tests..."
            HEADER=""
            ;;
          tests-passed)
            LINE="✅ ${TG_TEST_TYPE}: ${TG_TESTS_PASSED} passed"
            HEADER=""
            ;;
          tests-failed)
            FAIL_INFO="${TG_TESTS_FAILED} failed, ${TG_TESTS_PASSED} passed"
            LINE="❌ ${TG_TEST_TYPE}: ${FAIL_INFO}"
            HEADER="❌ <b>${TG_SERVICE}</b>"
            ;;
          tests-skipped)
            LINE="⏭ ${TG_TEST_TYPE}: no tests"
            HEADER=""
            ;;
          deploy-started)
            LINE="⏳ Deploying to ${TG_ENV}..."
            HEADER=""
            ;;
          deploy-success)
            LINE="✅ Deployed (${TG_DURATION})"
            HEADER="✅ <b>${TG_SERVICE} → ${TG_ENV}</b>"
            ;;
          deploy-failure)
            LINE="❌ Deploy failed"
            HEADER="❌ <b>${TG_SERVICE} → ${TG_ENV}</b>"
            ;;
          *)
            LINE="ℹ️ ${TG_STATUS}"
            HEADER=""
            ;;
        esac

        # Strip all in-progress (⏳) lines from previous content on any completion status
        if [ -n "$PREV" ]; then
          case "$TG_STATUS" in
            *-passed|*-failed|*-success|*-failure)
              PREV=$(echo "$PREV" | grep -v '⏳' || true)
              ;;
          esac
        fi

        # Compose message: header (if new/updated) + previous lines + new line + link
        LINK="<a href=\"${GITHUB_RUN_URL}\">🔗 View Run</a>"
        if [ -n "$HEADER" ] && [ -n "$PREV" ]; then
          BODY_LINES=$(echo "$PREV" | tail -n +2 | grep -v '🔗 View Run' || true)
          MSG=$(printf '%s\n%s\n%s\n%s' "$HEADER" "$BODY_LINES" "$LINE" "$LINK")
        elif [ -n "$HEADER" ]; then
          MSG=$(printf '%s\n%s\n%s' "$HEADER" "$LINE" "$LINK")
        elif [ -n "$PREV" ]; then
          BODY=$(echo "$PREV" | grep -v '🔗 View Run' || true)
          MSG=$(printf '%s\n%s\n%s' "$BODY" "$LINE" "$LINK")
        else
          MSG=$(printf '%s\n%s' "$LINE" "$LINK")
        fi

        # Clean up: remove empty lines
        MSG=$(echo "$MSG" | sed '/^[[:space:]]*$/d')

        # Send or edit
        if [ -n "$TG_MESSAGE_ID" ]; then
          RESPONSE=$(curl -s --max-time 10 --retry 1 -X POST "https://api.telegram.org/bot${TG_TOKEN}/editMessageText" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$TG_CHAT_ID" \
              --arg message_id "$TG_MESSAGE_ID" \
              --arg text "$MSG" \
              '{chat_id: $chat_id, message_id: ($message_id | tonumber), text: $text, parse_mode: "HTML", disable_web_page_preview: true}')")
          RESP_OK=$(echo "$RESPONSE" | jq -r '.ok // empty')
          if [ "$RESP_OK" != "true" ]; then
            RESP_DESC=$(echo "$RESPONSE" | jq -r '.description // empty')
            if echo "$RESP_DESC" | grep -q "message is not modified"; then
              echo "INFO: Message content unchanged, treating as success"
            else
              echo "WARNING: editMessageText failed" >&2
              echo "$RESPONSE" | jq '{ok, error_code, description}' >&2
            fi
          fi
          MSG_ID="$TG_MESSAGE_ID"
        else
          RESPONSE=$(curl -s --max-time 10 --retry 1 -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$TG_CHAT_ID" \
              --arg text "$MSG" \
              '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}')")
          MSG_ID=$(echo "$RESPONSE" | jq -r '.result.message_id // empty')
        fi

        if [ -z "$MSG_ID" ]; then
          echo "WARNING: Failed to get message_id from Telegram response"
          echo "$RESPONSE" | jq '{ok, error_code, description}' >&2 || true
          MSG_ID=""
        fi

        # Use heredoc delimiters for GITHUB_OUTPUT to prevent injection
        EOF_DELIM=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        {
          echo "message_id<<${EOF_DELIM}"
          echo "$MSG_ID"
          echo "${EOF_DELIM}"
        } >> "$GITHUB_OUTPUT"

        ENCODED=$(echo "$MSG" | base64 -w 0)
        {
          echo "message_lines<<${EOF_DELIM}"
          echo "$ENCODED"
          echo "${EOF_DELIM}"
        } >> "$GITHUB_OUTPUT"
