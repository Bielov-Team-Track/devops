name: Deploy Service

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Service name (e.g., auth-service)'
        required: true
        type: string
      environment:
        description: 'Target environment (staging or production)'
        required: true
        type: string
      has-migrations:
        description: 'Whether to handle migration bundles'
        required: false
        type: boolean
        default: false
      deploy-path:
        description: 'Path on target server'
        required: false
        type: string
        default: '/opt/volleyspike'
      health-check-path:
        description: 'Override health check URL path (default: derived from service name)'
        required: false
        type: string
        default: ''
    secrets:
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      SSH_KEY:
        required: true
      SSH_FINGERPRINT:
        required: true
      DEPLOY_DASHBOARD_API_KEY:
        required: false

jobs:
  deploy:
    name: Deploy ${{ inputs.service-name }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false

    steps:
      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Checkout devops repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Bielov-Team-Track/devops
          ref: main
          path: devops

      - name: Record deploy start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Derive health check path
        id: health
        env:
          SERVICE_NAME: ${{ inputs.service-name }}
          HEALTH_CHECK_PATH_INPUT: ${{ inputs.health-check-path }}
        run: |
          if [ -n "$HEALTH_CHECK_PATH_INPUT" ]; then
            echo "path=$HEALTH_CHECK_PATH_INPUT" >> "$GITHUB_OUTPUT"
          else
            # Derive from service name: auth-service -> /auth/health
            PREFIX="${SERVICE_NAME%-service}"
            echo "path=/${PREFIX}/health" >> "$GITHUB_OUTPUT"
          fi

      - name: Download migration bundle
        if: inputs.has-migrations
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: migration-bundle-${{ inputs.service-name }}
          path: ./migration-bundles

      - name: Verify migration bundle checksum
        if: inputs.has-migrations
        run: |
          cd migration-bundles
          for sha_file in *.sha256; do
            if [ -f "$sha_file" ]; then
              echo "Verifying $sha_file..."
              sha256sum -c "$sha_file"
            fi
          done

      - name: Report deploy started
        if: always() && vars.DEPLOY_DASHBOARD_URL != ''
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ vars.DEPLOY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          SERVICE: ${{ inputs.service-name }}
          ENVIRONMENT: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -fsS --max-time 10 -X POST "$DASHBOARD_URL/api/events" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg run_id "$RUN_ID" \
              --arg service "$SERVICE" \
              --arg environment "$ENVIRONMENT" \
              --arg stage "deploy" \
              --arg status "running" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg git_sha "$GIT_SHA" \
              --arg git_branch "$GIT_BRANCH" \
              --arg git_message "$GIT_MESSAGE" \
              --arg github_run_url "$RUN_URL" \
              '{run_id:$run_id,service:$service,environment:$environment,stage:$stage,status:$status,timestamp:$timestamp,git_sha:$git_sha,git_branch:$git_branch,git_message:$git_message,details:{github_run_url:$github_run_url}}')"

      - name: Upload migration bundles to server
        if: inputs.has-migrations
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          source: "migration-bundles/*"
          target: ${{ inputs.deploy-path }}/migrations/
          strip_components: 1

      - name: Run pre-migration backup (production only)
        if: inputs.environment == 'production' && inputs.has-migrations
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          DEPLOY_PATH: ${{ inputs.deploy-path }}
          SERVICE_NAME: ${{ inputs.service-name }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          command_timeout: 30m
          envs: DEPLOY_PATH,SERVICE_NAME
          script: |
            set -euo pipefail
            BACKUP_DIR="$DEPLOY_PATH/backups/$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"

            if [ ! -f "$HOME/.pgpass" ]; then
              echo "ERROR: .pgpass file not found"
              exit 1
            fi
            if [ "$(stat -c %a "$HOME/.pgpass")" != "600" ]; then
              echo "ERROR: .pgpass must have 0600 permissions"
              exit 1
            fi

            # Derive database name from service name (auth-service -> auth)
            DB_NAME="${SERVICE_NAME%-service}"
            echo "Backing up database: $DB_NAME"
            DUMP_FILE="$BACKUP_DIR/${DB_NAME}.dump"
            pg_dump -Fc -h localhost -U volleyer_user -d "$DB_NAME" -f "$DUMP_FILE"

            if [ ! -s "$DUMP_FILE" ]; then
              echo "ERROR: Backup for $DB_NAME is empty"
              exit 1
            fi
            echo "Backup saved: $DUMP_FILE ($(stat -c %s "$DUMP_FILE") bytes)"

            # Cleanup old backups (keep last 5)
            BACKUP_PARENT="$DEPLOY_PATH/backups"
            BACKUP_COUNT=$(ls -1d "$BACKUP_PARENT"/[0-9]* 2>/dev/null | wc -l)
            if [ "$BACKUP_COUNT" -gt 5 ]; then
              ls -1d "$BACKUP_PARENT"/[0-9]* | sort | head -n -5 | while read old_backup; do
                echo "Removing old backup: $old_backup"
                rm -rf "$old_backup"
              done
            fi

      - name: Run migration bundle
        if: inputs.has-migrations
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          DEPLOY_PATH: ${{ inputs.deploy-path }}
          SERVICE_NAME: ${{ inputs.service-name }}
          ENVIRONMENT: ${{ inputs.environment }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          command_timeout: 30m
          envs: DEPLOY_PATH,SERVICE_NAME,ENVIRONMENT
          script: |
            set -euo pipefail
            ARCH=$(uname -m)

            # Map environment name to .NET environment
            if [ "$ENVIRONMENT" = "staging" ]; then
              DOTNET_ENVIRONMENT="Staging"
            else
              DOTNET_ENVIRONMENT="Production"
            fi

            # Load DB connection strings from env files
            for envfile in "$DEPLOY_PATH"/.env.*; do
              [ -f "$envfile" ] || continue
              while IFS='=' read -r key value; do
                [ -z "$key" ] && continue
                case "$key" in \#*) continue ;; esac
                # Trim whitespace
                key=$(echo "$key" | xargs)
                value=$(echo "$value" | xargs)
                # Remove 'export ' prefix if present
                key="${key#export }"
                # Remove surrounding quotes
                value="${value%\"}"
                value="${value#\"}"
                value="${value%\'}"
                value="${value#\'}"
                case "$key" in
                  *_DB_CONNECTION) export "$key=$value" ;;
                esac
              done < "$envfile"
            done

            BUNDLE="$DEPLOY_PATH/migrations/efbundle-$SERVICE_NAME"
            if [ ! -f "$BUNDLE" ]; then
              echo "No migration bundle found for $SERVICE_NAME, skipping"
              exit 0
            fi

            # Map service name to DB connection variable
            SVC_UPPER=$(echo "$SERVICE_NAME" | tr '-' '_' | tr '[:lower:]' '[:upper:]')
            DB_VAR="${SVC_UPPER}_DB_CONNECTION"
            # Remove _SERVICE suffix for the DB var name
            DB_VAR=$(echo "$DB_VAR" | sed 's/_SERVICE//')
            CONN_STRING="${!DB_VAR:-}"
            if [ -z "$CONN_STRING" ]; then
              echo "ERROR: Environment variable '$DB_VAR' is not set"
              exit 1
            fi

            chmod +x "$BUNDLE"
            echo "=== Running migration: efbundle-$SERVICE_NAME ==="

            # Always run via Docker to avoid requiring .NET on the host
            PLATFORM_FLAG=""
            if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
              PLATFORM_FLAG="--platform linux/amd64"
            fi

            # Build env file for Docker with common env vars + service-specific env vars
            ENV_FILE="$(mktemp)"
            trap 'rm -f "$ENV_FILE"' EXIT
            chmod 600 "$ENV_FILE"
            echo "DOTNET_ENVIRONMENT=$DOTNET_ENVIRONMENT" >> "$ENV_FILE"
            for envfile in "$DEPLOY_PATH/.env.common" "$DEPLOY_PATH/.env.${SERVICE_NAME%-service}"; do
              [ -f "$envfile" ] || continue
              grep -v '^\s*#' "$envfile" | grep -v '^\s*$' >> "$ENV_FILE"
            done

            docker run $PLATFORM_FLAG --rm --network host \
              --env-file "$ENV_FILE" \
              -w /migrations \
              -v "$DEPLOY_PATH/migrations:/migrations" \
              mcr.microsoft.com/dotnet/aspnet:10.0 \
              /migrations/efbundle-$SERVICE_NAME \
              --connection "$CONN_STRING"

            echo "=== Migration completed ==="
            rm -f "$BUNDLE" "$BUNDLE.sha256"
            echo "Migration bundle cleaned up"

      - name: Deploy service (pull, restart, health check, update tags)
        id: deploy
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          TAG: ${{ github.sha }}
          SERVICE_NAME: ${{ inputs.service-name }}
          ENVIRONMENT: ${{ inputs.environment }}
          DEPLOY_PATH: ${{ inputs.deploy-path }}
          HEALTH_CHECK_PATH: ${{ steps.health.outputs.path }}
          OWNER_LC: ${{ env.OWNER_LC }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          fingerprint: ${{ secrets.SSH_FINGERPRINT }}
          command_timeout: 30m
          envs: TAG,SERVICE_NAME,ENVIRONMENT,DEPLOY_PATH,HEALTH_CHECK_PATH,OWNER_LC
          script: |
            set -euo pipefail

            cd "$DEPLOY_PATH"

            # Export lowercase owner for docker-compose image references
            export GITHUB_REPOSITORY_OWNER="$OWNER_LC"

            # Validate inputs to prevent shell injection
            if ! echo "$SERVICE_NAME" | grep -qE '^[a-z][a-z0-9-]{1,30}$'; then
              echo "ERROR: Invalid SERVICE_NAME: $SERVICE_NAME"
              exit 1
            fi
            if ! echo "$TAG" | grep -qE '^[a-f0-9]{7,40}$'; then
              echo "ERROR: Invalid TAG: $TAG"
              exit 1
            fi

            # Validate environment (allowlist)
            if [ "$ENVIRONMENT" != "staging" ] && [ "$ENVIRONMENT" != "production" ]; then
              echo "ERROR: Invalid ENVIRONMENT: $ENVIRONMENT (must be 'staging' or 'production')"
              exit 1
            fi

            # Validate DEPLOY_PATH (allowlist)
            case "$DEPLOY_PATH" in
              /opt/volleyspike) ;;
              *) echo "ERROR: Invalid DEPLOY_PATH: $DEPLOY_PATH"; exit 1 ;;
            esac

            # Validate HEALTH_CHECK_PATH
            if ! echo "$HEALTH_CHECK_PATH" | grep -qE '^/[a-z0-9/-]{1,50}$'; then
              echo "ERROR: Invalid HEALTH_CHECK_PATH: $HEALTH_CHECK_PATH"
              exit 1
            fi

            # Construct COMPOSE_FILES from validated environment
            COMPOSE_FILES="-f docker-compose.yml -f docker-compose.${ENVIRONMENT}.yml"

            LOCK_FILE="/opt/volleyspike/.deploy.lock"
            TAG_VAR=$(echo "$SERVICE_NAME" | tr '-' '_' | tr '[:lower:]' '[:upper:]')_TAG

            # --- Phase 1: Acquire lock, read tags, pull image, restart service, release lock ---
            (
              flock -x 200 || { echo "ERROR: Could not acquire deploy lock"; exit 1; }

              # Load current tags safely (no source - avoids arbitrary code execution)
              if [ -f "$DEPLOY_PATH/.env.tags" ]; then
                while IFS='=' read -r key value; do
                  # Skip comments and empty lines (POSIX-compatible)
                  [ -z "$key" ] && continue
                  case "$key" in \#*) continue ;; esac
                  # Validate key format
                  if ! echo "$key" | grep -qE '^[A-Z_]+$'; then
                    echo "WARNING: Skipping invalid key: $key"
                    continue
                  fi
                  # Validate value format
                  if ! echo "$value" | grep -qE '^[a-zA-Z0-9._-]+$'; then
                    echo "WARNING: Skipping invalid value for $key"
                    continue
                  fi
                  export "$key=$value"
                done < "$DEPLOY_PATH/.env.tags"
              fi

              # Override this service's tag for the pull/restart
              export "$TAG_VAR=$TAG"

              # Pull and restart only the changed service
              # Close FD 200 before docker commands to prevent child processes from
              # inheriting the flock file descriptor (which would hold the lock open)
              docker compose $COMPOSE_FILES pull "$SERVICE_NAME" 200>&-
              docker compose $COMPOSE_FILES up -d --no-deps "$SERVICE_NAME" 200>&-
            ) 200>"$LOCK_FILE"

            # --- Phase 2: Health check OUTSIDE the lock ---
            # Check container health directly via Docker (avoids reverse proxy issues)
            HEALTH_CHECK_OK="false"
            MAX_RETRIES=30
            RETRY_INTERVAL=5

            echo "Starting health check for $SERVICE_NAME (max ${MAX_RETRIES} attempts, ${RETRY_INTERVAL}s interval)"
            for i in $(seq 1 "$MAX_RETRIES"); do
              HEALTH_STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose $COMPOSE_FILES ps -q "$SERVICE_NAME")" 2>/dev/null || echo "unknown")
              if [ "$HEALTH_STATUS" = "healthy" ]; then
                echo "Health check passed on attempt $i (status: healthy)"
                HEALTH_CHECK_OK="true"
                break
              fi
              echo "Health check attempt $i/$MAX_RETRIES: status=$HEALTH_STATUS, retrying in ${RETRY_INTERVAL}s..."
              sleep "$RETRY_INTERVAL"
            done

            # --- Phase 3: Re-acquire lock, update .env.tags, release lock ---
            if [ "$HEALTH_CHECK_OK" = "true" ]; then
              (
                flock -x 200 || { echo "ERROR: Could not acquire deploy lock"; exit 1; }

                # Only persist the tag to .env.tags AFTER successful deploy + health check
                if grep -q "^${TAG_VAR}=" "$DEPLOY_PATH/.env.tags" 2>/dev/null; then
                  sed -i "s|^${TAG_VAR}=.*|${TAG_VAR}=${TAG}|" "$DEPLOY_PATH/.env.tags"
                else
                  echo "${TAG_VAR}=${TAG}" >> "$DEPLOY_PATH/.env.tags"
                fi
              ) 200>"$LOCK_FILE"
              echo "Deploy successful: $SERVICE_NAME updated to $TAG"
            else
              echo "ERROR: Health check failed for $SERVICE_NAME after $MAX_RETRIES attempts."
              echo "Rolling back $SERVICE_NAME to previous image..."

              # Re-acquire lock, read OLD tags from .env.tags (which was NOT updated),
              # and restore the previous container image
              (
                flock -x 200 || { echo "ERROR: Could not acquire deploy lock for rollback"; exit 1; }

                if [ -f "$DEPLOY_PATH/.env.tags" ]; then
                  while IFS='=' read -r key value; do
                    [ -z "$key" ] && continue
                    case "$key" in \#*) continue ;; esac
                    echo "$key" | grep -qE '^[A-Z_]+$' || continue
                    echo "$value" | grep -qE '^[a-zA-Z0-9._-]+$' || continue
                    export "$key=$value"
                  done < "$DEPLOY_PATH/.env.tags"
                fi

                docker compose $COMPOSE_FILES pull "$SERVICE_NAME" 200>&-
                docker compose $COMPOSE_FILES up -d --no-deps "$SERVICE_NAME" 200>&-
              ) 200>"$LOCK_FILE"

              echo "ERROR: Rolled back $SERVICE_NAME to previous tag. Deploy failed."
              exit 1
            fi

      - name: Calculate duration
        if: always()
        id: duration
        env:
          START: ${{ steps.timer.outputs.start }}
        run: |
          END=$(date +%s)
          DIFF=$((END - START))
          MINS=$((DIFF / 60))
          SECS=$((DIFF % 60))
          echo "duration=${MINS}m ${SECS}s" >> "$GITHUB_OUTPUT"

      - name: Report deploy success
        if: success() && vars.DEPLOY_DASHBOARD_URL != ''
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ vars.DEPLOY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          SERVICE: ${{ inputs.service-name }}
          ENVIRONMENT: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -fsS --max-time 10 -X POST "$DASHBOARD_URL/api/events" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg run_id "$RUN_ID" \
              --arg service "$SERVICE" \
              --arg environment "$ENVIRONMENT" \
              --arg stage "deploy" \
              --arg status "success" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg git_sha "$GIT_SHA" \
              --arg git_branch "$GIT_BRANCH" \
              --arg git_message "$GIT_MESSAGE" \
              --arg github_run_url "$RUN_URL" \
              '{run_id:$run_id,service:$service,environment:$environment,stage:$stage,status:$status,timestamp:$timestamp,git_sha:$git_sha,git_branch:$git_branch,git_message:$git_message,details:{github_run_url:$github_run_url}}')"

      - name: Report deploy failure
        if: failure() && vars.DEPLOY_DASHBOARD_URL != ''
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ vars.DEPLOY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          SERVICE: ${{ inputs.service-name }}
          ENVIRONMENT: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -fsS --max-time 10 -X POST "$DASHBOARD_URL/api/events" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg run_id "$RUN_ID" \
              --arg service "$SERVICE" \
              --arg environment "$ENVIRONMENT" \
              --arg stage "deploy" \
              --arg status "failure" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg git_sha "$GIT_SHA" \
              --arg git_branch "$GIT_BRANCH" \
              --arg git_message "$GIT_MESSAGE" \
              --arg github_run_url "$RUN_URL" \
              '{run_id:$run_id,service:$service,environment:$environment,stage:$stage,status:$status,timestamp:$timestamp,git_sha:$git_sha,git_branch:$git_branch,git_message:$git_message,details:{github_run_url:$github_run_url}}')"
