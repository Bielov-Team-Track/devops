name: E2E Tests (Staging)

on:
  workflow_dispatch:
    inputs:
      test-filter:
        description: 'Playwright test filter (e.g., "auth" or "clubs")'
        required: false
        default: ''
  workflow_call:
    inputs:
      test-filter:
        description: 'Playwright test filter'
        required: false
        type: string
        default: ''
    secrets:
      SSH_HOST:
        required: true
      SSH_USER:
        required: true
      SSH_KEY:
        required: true
      SSH_FINGERPRINT:
        required: true

jobs:
  e2e-tests:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30

    steps:
      - name: Checkout E2E tests
        uses: actions/checkout@v4
        with:
          repository: Bielov-Team-Track/Bielov-Team-Track
          sparse-checkout: tests/e2e
          sparse-checkout-cone-mode: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: tests/e2e/package-lock.json

      - name: Install dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add SSH fingerprint
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_FINGERPRINT }}" >> ~/.ssh/known_hosts

      - name: Health check staging services
        run: |
          echo "Checking staging services health..."
          SERVICES=("auth" "events" "clubs" "profiles" "messages" "notifications" "social" "coaching" "payments")
          FAILED=0
          for SVC in "${SERVICES[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://staging-api.volleyspike.app/$SVC/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "  $SVC: OK"
            else
              echo "  $SVC: FAILED (HTTP $STATUS)"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "ERROR: $FAILED service(s) unhealthy. Aborting E2E tests."
            exit 1
          fi

      - name: Reset staging databases
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "bash /opt/volleyspike/reset-staging-db.sh"

      - name: Report e2e started
        if: always() && vars.DEPLOY_DASHBOARD_URL != ''
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ vars.DEPLOY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -fsS --max-time 10 -X POST "$DASHBOARD_URL/api/events" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg run_id "$RUN_ID" \
              --arg service "frontend" \
              --arg environment "staging" \
              --arg stage "e2e" \
              --arg status "running" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg git_sha "$GIT_SHA" \
              --arg git_branch "$GIT_BRANCH" \
              --arg git_message "$GIT_MESSAGE" \
              --arg github_run_url "$RUN_URL" \
              '{run_id:$run_id,service:$service,environment:$environment,stage:$stage,status:$status,timestamp:$timestamp,git_sha:$git_sha,git_branch:$git_branch,git_message:$git_message,details:{github_run_url:$github_run_url}}')"

      - name: Run Playwright tests
        id: playwright
        working-directory: tests/e2e
        env:
          BASE_URL: https://staging.volleyspike.app
          CI: true
        run: |
          FILTER="${{ inputs.test-filter || '' }}"
          if [ -n "$FILTER" ]; then
            npx playwright test --grep "$FILTER"
          else
            npx playwright test
          fi

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 14

      - name: Report e2e result
        if: always() && vars.DEPLOY_DASHBOARD_URL != ''
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ vars.DEPLOY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          E2E_STATUS: ${{ steps.playwright.outcome == 'success' && 'success' || 'failure' }}
        run: |
          curl -fsS --max-time 10 -X POST "$DASHBOARD_URL/api/events" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg run_id "$RUN_ID" \
              --arg service "frontend" \
              --arg environment "staging" \
              --arg stage "e2e" \
              --arg status "$E2E_STATUS" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg git_sha "$GIT_SHA" \
              --arg git_branch "$GIT_BRANCH" \
              --arg git_message "$GIT_MESSAGE" \
              --arg github_run_url "$RUN_URL" \
              '{run_id:$run_id,service:$service,environment:$environment,stage:$stage,status:$status,timestamp:$timestamp,git_sha:$git_sha,git_branch:$git_branch,git_message:$git_message,details:{github_run_url:$github_run_url}}')"
