name: Build .NET Service

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Service name (e.g., auth-service)'
        required: true
        type: string
      service-path:
        description: 'Path to service (e.g., microservices/auth-service)'
        required: true
        type: string
      project-name:
        description: 'Main project name (e.g., Auth)'
        required: true
        type: string
      solution-file:
        description: 'Solution file name (e.g., Auth.sln)'
        required: true
        type: string
      port:
        description: 'Service port'
        required: true
        type: string
      run-tests:
        description: 'Run unit tests'
        required: false
        type: boolean
        default: true
      push-docker-image:
        description: 'Build and push Docker image'
        required: false
        type: boolean
        default: false
      build-migration-bundle:
        description: 'Build EF Core migration bundle'
        required: false
        type: boolean
        default: false
      infrastructure-project-path:
        description: 'Relative path to the .csproj containing EF migrations (default: {ProjectName}.Infrastructure/{ProjectName}.Infrastructure.csproj). Override for services with non-standard layouts (e.g., auth-service uses Auth.Infrastructure/Auth.Infrastructure.csproj).'
        required: false
        type: string
        default: ''
      environment:
        description: 'Deployment environment (staging/production) for notification badge'
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    steps:
      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Record build start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Report build started
        if: always() && vars.DEPLOY_DASHBOARD_URL != ''
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ vars.DEPLOY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          SERVICE: ${{ inputs.service-name }}
          ENVIRONMENT: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s --max-time 10 -X POST "$DASHBOARD_URL/api/events" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg run_id "$RUN_ID" \
              --arg service "$SERVICE" \
              --arg environment "$ENVIRONMENT" \
              --arg stage "build" \
              --arg status "running" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg git_sha "$GIT_SHA" \
              --arg git_branch "$GIT_BRANCH" \
              --arg git_message "$GIT_MESSAGE" \
              --arg github_run_url "$RUN_URL" \
              '{run_id:$run_id,service:$service,environment:$environment,stage:$stage,status:$status,timestamp:$timestamp,git_sha:$git_sha,git_branch:$git_branch,git_message:$git_message,details:{github_run_url:$github_run_url}}')"

      - name: Checkout shared libraries
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Bielov-Team-Track/shared
          path: shared

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.nuget/packages
          key: nuget-${{ inputs.service-name }}-${{ hashFiles(format('{0}/**/packages.lock.json', inputs.service-path)) }}
          restore-keys: |
            nuget-${{ inputs.service-name }}-

      - name: Restore dependencies
        run: dotnet restore "$SOLUTION_FILE"
        working-directory: ${{ inputs.service-path }}
        env:
          SOLUTION_FILE: ${{ inputs.solution-file }}

      - name: Build
        id: build
        run: dotnet build "$SOLUTION_FILE" --no-restore -c Release
        working-directory: ${{ inputs.service-path }}
        env:
          SOLUTION_FILE: ${{ inputs.solution-file }}

      - name: Run unit tests
        id: tests
        if: inputs.run-tests
        run: dotnet test --no-build -c Release --filter "Category=Unit" --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
        working-directory: ${{ inputs.service-path }}

      - name: Parse test results
        if: inputs.run-tests && always()
        id: test-results
        env:
          SERVICE_PATH: ${{ inputs.service-path }}
        run: |
          TRX_FILE=$(find "$SERVICE_PATH" -name "test-results.trx" | head -1)
          if [ -f "$TRX_FILE" ]; then
            COUNTERS=$(grep '<Counters' "$TRX_FILE" | head -1)
            PASSED=$(echo "$COUNTERS" | grep -oP 'passed="\K[0-9]+' || echo "0")
            FAILED=$(echo "$COUNTERS" | grep -oP 'failed="\K[0-9]+' || echo "0")
            TOTAL=$(echo "$COUNTERS" | grep -oP 'total="\K[0-9]+' || echo "0")
            echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
            echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
            echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          fi

      - name: Parse coverage results
        if: inputs.run-tests && always()
        id: coverage
        env:
          SERVICE_PATH: ${{ inputs.service-path }}
        run: |
          COV_FILE=$(find "$SERVICE_PATH" -name "coverage.cobertura.xml" | head -1)
          if [ -f "$COV_FILE" ]; then
            LINE_RATE=$(grep -oP 'line-rate="\K[0-9.]+' "$COV_FILE" | head -1)
            if [ -n "$LINE_RATE" ]; then
              COVERAGE=$(echo "$LINE_RATE * 100" | bc -l | xargs printf "%.1f")
              echo "percent=$COVERAGE" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Upload test results
        if: inputs.run-tests && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results-${{ inputs.service-name }}
          path: ${{ inputs.service-path }}/**/test-results.trx
          retention-days: 7

      - name: Build migration bundle
        if: inputs.build-migration-bundle
        run: |
          dotnet tool install --global dotnet-ef --version 10.0.0
          INFRA_PATH="${INFRA_PATH_OVERRIDE:-$PROJECT_NAME.Infrastructure/$PROJECT_NAME.Infrastructure.csproj}"
          dotnet ef migrations bundle \
            --project "$INFRA_PATH" \
            --startup-project "$PROJECT_NAME/$PROJECT_NAME.csproj" \
            --configuration Release \
            --no-build \
            -r linux-x64 \
            -o "efbundle-$SERVICE_NAME"
          chmod +x "efbundle-$SERVICE_NAME"
          sha256sum "efbundle-$SERVICE_NAME" > "efbundle-$SERVICE_NAME.sha256"
        working-directory: ${{ inputs.service-path }}
        env:
          PROJECT_NAME: ${{ inputs.project-name }}
          SERVICE_NAME: ${{ inputs.service-name }}
          INFRA_PATH_OVERRIDE: ${{ inputs.infrastructure-project-path }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          S3__Bucket: ci-placeholder
          S3__PublicBaseUrl: https://placeholder.s3.eu-west-2.amazonaws.com
          S3__PresignedUrlExpiryMinutes: "15"

      - name: Upload migration bundle
        if: inputs.build-migration-bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: migration-bundle-${{ inputs.service-name }}
          path: |
            ${{ inputs.service-path }}/efbundle-${{ inputs.service-name }}
            ${{ inputs.service-path }}/efbundle-${{ inputs.service-name }}.sha256
          retention-days: 1

      - name: Set up QEMU
        if: inputs.push-docker-image
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        if: inputs.push-docker-image
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        if: inputs.push-docker-image
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker-push
        if: inputs.push-docker-image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ inputs.service-path }}
          file: ${{ inputs.service-path }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/volleyer-${{ inputs.service-name }}:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/volleyer-${{ inputs.service-name }}:${{ github.ref_name }}
          cache-from: type=gha,scope=${{ inputs.service-name }}-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.service-name }}-${{ github.ref_name }}

      - name: Calculate build duration
        if: always()
        id: duration
        env:
          START: ${{ steps.timer.outputs.start }}
        run: |
          END=$(date +%s)
          DIFF=$((END - START))
          MINS=$((DIFF / 60))
          SECS=$((DIFF % 60))
          echo "duration=${MINS}m ${SECS}s" >> "$GITHUB_OUTPUT"

      - name: Report build result
        if: always() && vars.DEPLOY_DASHBOARD_URL != ''
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ vars.DEPLOY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          SERVICE: ${{ inputs.service-name }}
          ENVIRONMENT: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_STATUS: ${{ steps.build.outcome == 'success' && 'success' || 'failure' }}
        run: |
          curl -s --max-time 10 -X POST "$DASHBOARD_URL/api/events" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg run_id "$RUN_ID" \
              --arg service "$SERVICE" \
              --arg environment "$ENVIRONMENT" \
              --arg stage "build" \
              --arg status "$BUILD_STATUS" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg git_sha "$GIT_SHA" \
              --arg git_branch "$GIT_BRANCH" \
              --arg git_message "$GIT_MESSAGE" \
              --arg github_run_url "$RUN_URL" \
              '{run_id:$run_id,service:$service,environment:$environment,stage:$stage,status:$status,timestamp:$timestamp,git_sha:$git_sha,git_branch:$git_branch,git_message:$git_message,details:{github_run_url:$github_run_url}}')"

      - name: Report test result
        if: inputs.run-tests && always() && vars.DEPLOY_DASHBOARD_URL != ''
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ vars.DEPLOY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          SERVICE: ${{ inputs.service-name }}
          ENVIRONMENT: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TEST_STATUS: ${{ steps.tests.outcome == 'success' && 'success' || 'failure' }}
          PASSED: ${{ steps.test-results.outputs.passed || '0' }}
          FAILED: ${{ steps.test-results.outputs.failed || '0' }}
          TOTAL: ${{ steps.test-results.outputs.total || '0' }}
          COVERAGE: ${{ steps.coverage.outputs.percent || '0' }}
        run: |
          curl -s --max-time 10 -X POST "$DASHBOARD_URL/api/events" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg run_id "$RUN_ID" \
              --arg service "$SERVICE" \
              --arg environment "$ENVIRONMENT" \
              --arg stage "unit_tests" \
              --arg status "$TEST_STATUS" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg git_sha "$GIT_SHA" \
              --arg git_branch "$GIT_BRANCH" \
              --arg git_message "$GIT_MESSAGE" \
              --arg github_run_url "$RUN_URL" \
              --argjson passed "$PASSED" \
              --argjson failed "$FAILED" \
              --argjson total "$TOTAL" \
              --argjson coverage "$COVERAGE" \
              '{run_id:$run_id,service:$service,environment:$environment,stage:$stage,status:$status,timestamp:$timestamp,git_sha:$git_sha,git_branch:$git_branch,git_message:$git_message,details:{passed:$passed,failed:$failed,total:$total,coverage_percent:$coverage,github_run_url:$github_run_url}}')"

      - name: Report docker result
        if: inputs.push-docker-image && always() && vars.DEPLOY_DASHBOARD_URL != ''
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ vars.DEPLOY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          SERVICE: ${{ inputs.service-name }}
          ENVIRONMENT: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DOCKER_STATUS: ${{ steps.docker-push.outcome == 'success' && 'success' || 'failure' }}
        run: |
          curl -s --max-time 10 -X POST "$DASHBOARD_URL/api/events" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg run_id "$RUN_ID" \
              --arg service "$SERVICE" \
              --arg environment "$ENVIRONMENT" \
              --arg stage "docker" \
              --arg status "$DOCKER_STATUS" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg git_sha "$GIT_SHA" \
              --arg git_branch "$GIT_BRANCH" \
              --arg git_message "$GIT_MESSAGE" \
              --arg github_run_url "$RUN_URL" \
              '{run_id:$run_id,service:$service,environment:$environment,stage:$stage,status:$status,timestamp:$timestamp,git_sha:$git_sha,git_branch:$git_branch,git_message:$git_message,details:{github_run_url:$github_run_url}}')"
