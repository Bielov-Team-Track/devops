name: Build .NET Service

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Service name (e.g., auth-service)'
        required: true
        type: string
      service-path:
        description: 'Path to service (e.g., microservices/auth-service)'
        required: true
        type: string
      project-name:
        description: 'Main project name (e.g., Auth)'
        required: true
        type: string
      solution-file:
        description: 'Solution file name (e.g., Auth.sln)'
        required: true
        type: string
      port:
        description: 'Service port'
        required: true
        type: string
      run-tests:
        description: 'Run unit tests'
        required: false
        type: boolean
        default: true
      push-docker-image:
        description: 'Build and push Docker image'
        required: false
        type: boolean
        default: false
      build-migration-bundle:
        description: 'Build EF Core migration bundle'
        required: false
        type: boolean
        default: false
      infrastructure-project-path:
        description: 'Relative path to the .csproj containing EF migrations (default: {ProjectName}.Infrastructure/{ProjectName}.Infrastructure.csproj). Override for services with non-standard layouts (e.g., auth-service uses Auth.Infrastructure/Auth.Infrastructure.csproj).'
        required: false
        type: string
        default: ''
      telegram-message-id:
        description: 'Existing Telegram message ID to continue editing from a previous job'
        required: false
        type: string
        default: ''
      telegram-message-lines:
        description: 'Previous message content (base64) to preserve from a previous job'
        required: false
        type: string
        default: ''
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false
    outputs:
      telegram-message-id:
        description: 'Telegram message ID for editing in downstream jobs'
        value: ${{ jobs.build.outputs.telegram-message-id }}
      telegram-message-lines:
        description: 'Current message content (base64) for downstream jobs'
        value: ${{ jobs.build.outputs.telegram-message-lines }}

jobs:
  build:
    name: Build ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    outputs:
      telegram-message-id: ${{ steps.tg-result.outputs.message-id }}
      telegram-message-lines: ${{ steps.tg-result.outputs.message-lines }}
    steps:
      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Record build start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Send build started notification
        if: env.TG_TOKEN != ''
        id: tg-start
        continue-on-error: true
        uses: Bielov-Team-Track/devops/actions/telegram-notify@main
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        with:
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          status: build-started
          service-name: ${{ inputs.service-name }}
          message-id: ${{ inputs.telegram-message-id }}
          previous-lines: ${{ inputs.telegram-message-lines }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Checkout shared libraries
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Bielov-Team-Track/shared
          path: shared

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.nuget/packages
          key: nuget-${{ inputs.service-name }}-${{ hashFiles(format('{0}/**/packages.lock.json', inputs.service-path)) }}
          restore-keys: |
            nuget-${{ inputs.service-name }}-

      - name: Restore dependencies
        run: dotnet restore "$SOLUTION_FILE" --locked-mode
        working-directory: ${{ inputs.service-path }}
        env:
          SOLUTION_FILE: ${{ inputs.solution-file }}

      - name: Build
        run: dotnet build "$SOLUTION_FILE" --no-restore -c Release
        working-directory: ${{ inputs.service-path }}
        env:
          SOLUTION_FILE: ${{ inputs.solution-file }}

      - name: Run unit tests
        if: inputs.run-tests
        run: dotnet test --no-build -c Release --filter "Category=Unit" --verbosity normal --logger "trx;LogFileName=test-results.trx"
        working-directory: ${{ inputs.service-path }}

      - name: Parse test results
        if: inputs.run-tests && always()
        id: test-results
        run: |
          TRX_FILE=$(find . -name "test-results.trx" -path "*/${{ inputs.service-path }}/*" | head -1)
          if [ -f "$TRX_FILE" ]; then
            COUNTERS=$(grep '<Counters' "$TRX_FILE" | head -1)
            PASSED=$(echo "$COUNTERS" | grep -oP 'passed="\K[0-9]+' || echo "0")
            FAILED=$(echo "$COUNTERS" | grep -oP 'failed="\K[0-9]+' || echo "0")
            TOTAL=$(echo "$COUNTERS" | grep -oP 'total="\K[0-9]+' || echo "0")
            echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
            echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
            echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload test results
        if: inputs.run-tests && always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: test-results-${{ inputs.service-name }}
          path: ${{ inputs.service-path }}/**/test-results.trx
          retention-days: 7

      - name: Build migration bundle
        if: inputs.build-migration-bundle
        run: |
          dotnet tool install --global dotnet-ef --version 10.0.0
          INFRA_PATH="${INFRA_PATH_OVERRIDE:-$PROJECT_NAME.Infrastructure/$PROJECT_NAME.Infrastructure.csproj}"
          dotnet ef migrations bundle \
            --project "$INFRA_PATH" \
            --startup-project "$PROJECT_NAME/$PROJECT_NAME.csproj" \
            --configuration Release \
            --no-build \
            -r linux-x64 \
            -o "efbundle-$SERVICE_NAME"
          chmod +x "efbundle-$SERVICE_NAME"
          sha256sum "efbundle-$SERVICE_NAME" > "efbundle-$SERVICE_NAME.sha256"
        working-directory: ${{ inputs.service-path }}
        env:
          PROJECT_NAME: ${{ inputs.project-name }}
          SERVICE_NAME: ${{ inputs.service-name }}
          INFRA_PATH_OVERRIDE: ${{ inputs.infrastructure-project-path }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          S3__Bucket: ci-placeholder
          S3__PublicBaseUrl: https://placeholder.s3.eu-west-2.amazonaws.com
          S3__PresignedUrlExpiryMinutes: "15"

      - name: Restore lock files after migration bundle
        if: inputs.build-migration-bundle && inputs.push-docker-image
        run: git checkout -- shared/
        working-directory: ${{ inputs.service-path }}

      - name: Upload migration bundle
        if: inputs.build-migration-bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: migration-bundle-${{ inputs.service-name }}
          path: |
            ${{ inputs.service-path }}/efbundle-${{ inputs.service-name }}
            ${{ inputs.service-path }}/efbundle-${{ inputs.service-name }}.sha256
          retention-days: 1

      - name: Set up QEMU
        if: inputs.push-docker-image
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        if: inputs.push-docker-image
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        if: inputs.push-docker-image
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: inputs.push-docker-image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ inputs.service-path }}
          file: ${{ inputs.service-path }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/volleyer-${{ inputs.service-name }}:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/volleyer-${{ inputs.service-name }}:${{ github.ref_name }}
          cache-from: type=gha,scope=${{ inputs.service-name }}-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.service-name }}-${{ github.ref_name }}

      - name: Calculate build duration
        if: always()
        id: duration
        env:
          START: ${{ steps.timer.outputs.start }}
        run: |
          END=$(date +%s)
          DIFF=$((END - START))
          MINS=$((DIFF / 60))
          SECS=$((DIFF % 60))
          echo "duration=${MINS}m ${SECS}s" >> "$GITHUB_OUTPUT"

      - name: Send build result notification
        if: always() && env.TG_TOKEN != '' && steps.tg-start.outputs.message-id != ''
        id: tg-result
        continue-on-error: true
        uses: Bielov-Team-Track/devops/actions/telegram-notify@main
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        with:
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          status: ${{ job.status == 'success' && 'build-passed' || 'build-failed' }}
          service-name: ${{ inputs.service-name }}
          message-id: ${{ steps.tg-start.outputs.message-id }}
          previous-lines: ${{ steps.tg-start.outputs.message-lines }}
          duration: ${{ steps.duration.outputs.duration }}
          test-type: Unit
          tests-passed: ${{ steps.test-results.outputs.passed }}
          tests-failed: ${{ steps.test-results.outputs.failed }}
          tests-total: ${{ steps.test-results.outputs.total }}
