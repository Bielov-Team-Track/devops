name: Build .NET Service

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      service-path:
        required: true
        type: string
      project-name:
        required: true
        type: string
      solution-file:
        required: true
        type: string
      port:
        required: true
        type: string

jobs:
  build:
    name: Build ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Building ${{ inputs.service-name }}"
