name: Integration Tests

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Service name (e.g., auth-service)'
        required: true
        type: string
      service-path:
        description: 'Path to service source'
        required: true
        type: string
      project-name:
        description: 'Main project name (e.g., Auth)'
        required: true
        type: string
      solution-file:
        description: 'Solution file name (e.g., Auth.sln)'
        required: true
        type: string
      environment:
        description: 'Deployment environment (staging/production) for notification badge'
        required: false
        type: string
        default: ''
    outputs:
      skipped:
        description: 'Whether integration tests were skipped (no tests found)'
        value: ${{ jobs.test.outputs.skipped }}

jobs:
  test:
    name: Integration Tests (${{ inputs.service-name }})
    runs-on: ubuntu-latest
    outputs:
      skipped: ${{ steps.test-results.outputs.skipped }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Checkout shared libraries
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: Bielov-Team-Track/shared
          path: shared

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.nuget/packages
          key: nuget-${{ inputs.service-name }}-${{ hashFiles(format('{0}/**/packages.lock.json', inputs.service-path)) }}
          restore-keys: |
            nuget-${{ inputs.service-name }}-

      - name: Restore and build
        run: dotnet build "$SOLUTION_FILE" -c Release
        working-directory: ${{ inputs.service-path }}
        env:
          SOLUTION_FILE: ${{ inputs.solution-file }}

      - name: Report integration tests started
        if: always() && vars.DEPLOY_DASHBOARD_URL != ''
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ vars.DEPLOY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          SERVICE: ${{ inputs.service-name }}
          ENVIRONMENT: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s --max-time 10 -X POST "$DASHBOARD_URL/api/events" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg run_id "$RUN_ID" \
              --arg service "$SERVICE" \
              --arg environment "$ENVIRONMENT" \
              --arg stage "integration_tests" \
              --arg status "running" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg git_sha "$GIT_SHA" \
              --arg git_branch "$GIT_BRANCH" \
              --arg git_message "$GIT_MESSAGE" \
              --arg github_run_url "$RUN_URL" \
              '{run_id:$run_id,service:$service,environment:$environment,stage:$stage,status:$status,timestamp:$timestamp,git_sha:$git_sha,git_branch:$git_branch,git_message:$git_message,details:{github_run_url:$github_run_url}}')"

      - name: Run integration tests
        run: |
          dotnet test --no-build -c Release \
            --filter "Category=Integration" \
            --verbosity normal \
            --logger "trx;LogFileName=integration-results.trx" \
            --collect:"XPlat Code Coverage"
        working-directory: ${{ inputs.service-path }}

      - name: Parse test results
        if: always()
        id: test-results
        working-directory: ${{ inputs.service-path }}
        run: |
          TOTAL_PASSED=0
          TOTAL_FAILED=0
          TOTAL_TESTS=0
          FOUND_TRX=false

          while IFS= read -r TRX_FILE; do
            FOUND_TRX=true
            COUNTERS=$(grep '<Counters' "$TRX_FILE" | head -1)
            P=$(echo "$COUNTERS" | grep -oP 'passed="\K[0-9]+' || echo "0")
            F=$(echo "$COUNTERS" | grep -oP 'failed="\K[0-9]+' || echo "0")
            T=$(echo "$COUNTERS" | grep -oP 'total="\K[0-9]+' || echo "0")
            TOTAL_PASSED=$((TOTAL_PASSED + P))
            TOTAL_FAILED=$((TOTAL_FAILED + F))
            TOTAL_TESTS=$((TOTAL_TESTS + T))
          done < <(find . -name "integration-results.trx")

          echo "passed=$TOTAL_PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$TOTAL_FAILED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL_TESTS" >> "$GITHUB_OUTPUT"
          if [ "$FOUND_TRX" = "false" ] || [ "$TOTAL_TESTS" = "0" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Parse coverage results
        if: always()
        id: coverage
        env:
          SERVICE_PATH: ${{ inputs.service-path }}
        run: |
          COV_FILE=$(find "$SERVICE_PATH" -name "coverage.cobertura.xml" | head -1)
          if [ -f "$COV_FILE" ]; then
            LINE_RATE=$(grep -oP 'line-rate="\K[0-9.]+' "$COV_FILE" | head -1)
            if [ -n "$LINE_RATE" ]; then
              COVERAGE=$(echo "$LINE_RATE * 100" | bc -l | xargs printf "%.1f")
              echo "percent=$COVERAGE" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: integration-results-${{ inputs.service-name }}
          path: ${{ inputs.service-path }}/**/integration-results.trx
          retention-days: 7

      - name: Report integration tests result
        if: always() && vars.DEPLOY_DASHBOARD_URL != ''
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ vars.DEPLOY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          SERVICE: ${{ inputs.service-name }}
          ENVIRONMENT: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TEST_STATUS: ${{ job.status == 'success' && 'success' || 'failure' }}
          PASSED: ${{ steps.test-results.outputs.passed || '0' }}
          FAILED: ${{ steps.test-results.outputs.failed || '0' }}
          TOTAL: ${{ steps.test-results.outputs.total || '0' }}
          COVERAGE: ${{ steps.coverage.outputs.percent || '0' }}
        run: |
          curl -s --max-time 10 -X POST "$DASHBOARD_URL/api/events" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg run_id "$RUN_ID" \
              --arg service "$SERVICE" \
              --arg environment "$ENVIRONMENT" \
              --arg stage "integration_tests" \
              --arg status "$TEST_STATUS" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg git_sha "$GIT_SHA" \
              --arg git_branch "$GIT_BRANCH" \
              --arg git_message "$GIT_MESSAGE" \
              --arg github_run_url "$RUN_URL" \
              --argjson passed "$PASSED" \
              --argjson failed "$FAILED" \
              --argjson total "$TOTAL" \
              --argjson coverage "$COVERAGE" \
              '{run_id:$run_id,service:$service,environment:$environment,stage:$stage,status:$status,timestamp:$timestamp,git_sha:$git_sha,git_branch:$git_branch,git_message:$git_message,details:{passed:$passed,failed:$failed,total:$total,coverage_percent:$coverage,github_run_url:$github_run_url}}')"
