name: Build Frontend

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: false
        description: "GitHub environment for scoped variables (staging/production)"
      push-docker-image:
        description: 'Build and push Docker image'
        required: false
        type: boolean
        default: false
      telegram-message-id:
        description: 'Existing Telegram message ID to continue editing from a previous job'
        required: false
        type: string
        default: ''
      telegram-message-lines:
        description: 'Previous message content (base64) to preserve from a previous job'
        required: false
        type: string
        default: ''
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: false
      TELEGRAM_CHAT_ID:
        required: false
    outputs:
      telegram-message-id:
        description: 'Telegram message ID for editing in downstream jobs'
        value: ${{ jobs.build.outputs.telegram-message-id }}
      telegram-message-lines:
        description: 'Current message content (base64) for downstream jobs'
        value: ${{ jobs.build.outputs.telegram-message-lines }}

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || null }}
    permissions:
      contents: read
      packages: write
    outputs:
      telegram-message-id: ${{ steps.tg-result.outputs.message-id }}
      telegram-message-lines: ${{ steps.tg-result.outputs.message-lines }}

    steps:
      - name: Record build start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Send build started notification
        if: env.TG_TOKEN != ''
        id: tg-start
        continue-on-error: true
        uses: Bielov-Team-Track/devops/actions/telegram-notify@main
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        with:
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          status: ${{ inputs.push-docker-image && 'docker-started' || 'build-started' }}
          service-name: frontend
          message-id: ${{ inputs.telegram-message-id }}
          previous-lines: ${{ inputs.telegram-message-lines }}

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Set lowercase owner
        if: inputs.push-docker-image
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        if: inputs.push-docker-image
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        if: inputs.push-docker-image
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        if: inputs.push-docker-image
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: inputs.push-docker-image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/volleyer-frontend:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/volleyer-frontend:${{ github.ref_name }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WEBSOCKET_URL=${{ vars.NEXT_PUBLIC_WEBSOCKET_URL }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_BETA_MODE=${{ vars.NEXT_PUBLIC_BETA_MODE }}
            NEXT_PUBLIC_S3_HOSTNAME=${{ vars.NEXT_PUBLIC_S3_HOSTNAME }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=${{ vars.SENTRY_PROJECT }}
          cache-from: type=gha,scope=frontend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=frontend-${{ github.ref_name }}

      - name: Calculate build duration
        if: always()
        id: duration
        env:
          START: ${{ steps.timer.outputs.start }}
        run: |
          END=$(date +%s)
          DIFF=$((END - START))
          MINS=$((DIFF / 60))
          SECS=$((DIFF % 60))
          echo "duration=${MINS}m ${SECS}s" >> "$GITHUB_OUTPUT"

      - name: Send build result notification
        if: always() && env.TG_TOKEN != '' && steps.tg-start.outputs.message-id != ''
        id: tg-result
        continue-on-error: true
        uses: Bielov-Team-Track/devops/actions/telegram-notify@main
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        with:
          bot-token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          status: ${{ job.status == 'success' && (inputs.push-docker-image && 'docker-passed' || 'build-passed') || (inputs.push-docker-image && 'docker-failed') || 'build-failed' }}
          service-name: frontend
          message-id: ${{ steps.tg-start.outputs.message-id }}
          previous-lines: ${{ steps.tg-start.outputs.message-lines }}
          duration: ${{ steps.duration.outputs.duration }}
