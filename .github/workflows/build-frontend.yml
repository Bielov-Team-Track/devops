name: Build Frontend

on:
  workflow_call:
    inputs:
      environment:
        type: string
        required: false
        description: "GitHub environment for scoped variables (staging/production)"
      push-docker-image:
        description: 'Build and push Docker image'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || null }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Record build start time
        id: timer
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Report build started
        if: always() && vars.DEPLOY_DASHBOARD_URL != ''
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ vars.DEPLOY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          ENVIRONMENT: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -s --max-time 10 -X POST "$DASHBOARD_URL/api/events" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg run_id "$RUN_ID" \
              --arg service "frontend" \
              --arg environment "$ENVIRONMENT" \
              --arg stage "build" \
              --arg status "running" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg git_sha "$GIT_SHA" \
              --arg git_branch "$GIT_BRANCH" \
              --arg git_message "$GIT_MESSAGE" \
              --arg github_run_url "$RUN_URL" \
              '{run_id:$run_id,service:$service,environment:$environment,stage:$stage,status:$status,timestamp:$timestamp,git_sha:$git_sha,git_branch:$git_branch,git_message:$git_message,details:{github_run_url:$github_run_url}}')"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Set lowercase owner
        if: inputs.push-docker-image
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        if: inputs.push-docker-image
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        if: inputs.push-docker-image
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Login to GHCR
        if: inputs.push-docker-image
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: docker-push
        if: inputs.push-docker-image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/volleyer-frontend:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/volleyer-frontend:${{ github.ref_name }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WEBSOCKET_URL=${{ vars.NEXT_PUBLIC_WEBSOCKET_URL }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_BETA_MODE=${{ vars.NEXT_PUBLIC_BETA_MODE }}
            NEXT_PUBLIC_S3_HOSTNAME=${{ vars.NEXT_PUBLIC_S3_HOSTNAME }}
            NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
            SENTRY_ORG=${{ vars.SENTRY_ORG }}
            SENTRY_PROJECT=${{ vars.SENTRY_PROJECT }}
          cache-from: type=gha,scope=frontend-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=frontend-${{ github.ref_name }}

      - name: Calculate build duration
        if: always()
        id: duration
        env:
          START: ${{ steps.timer.outputs.start }}
        run: |
          END=$(date +%s)
          DIFF=$((END - START))
          MINS=$((DIFF / 60))
          SECS=$((DIFF % 60))
          echo "duration=${MINS}m ${SECS}s" >> "$GITHUB_OUTPUT"

      - name: Report build result
        if: always() && vars.DEPLOY_DASHBOARD_URL != ''
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ vars.DEPLOY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          ENVIRONMENT: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BUILD_STATUS: ${{ job.status == 'success' && 'success' || 'failure' }}
        run: |
          curl -s --max-time 10 -X POST "$DASHBOARD_URL/api/events" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg run_id "$RUN_ID" \
              --arg service "frontend" \
              --arg environment "$ENVIRONMENT" \
              --arg stage "build" \
              --arg status "$BUILD_STATUS" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg git_sha "$GIT_SHA" \
              --arg git_branch "$GIT_BRANCH" \
              --arg git_message "$GIT_MESSAGE" \
              --arg github_run_url "$RUN_URL" \
              '{run_id:$run_id,service:$service,environment:$environment,stage:$stage,status:$status,timestamp:$timestamp,git_sha:$git_sha,git_branch:$git_branch,git_message:$git_message,details:{github_run_url:$github_run_url}}')"

      - name: Report docker result
        if: inputs.push-docker-image && always() && vars.DEPLOY_DASHBOARD_URL != ''
        continue-on-error: true
        env:
          DASHBOARD_URL: ${{ vars.DEPLOY_DASHBOARD_URL }}
          API_KEY: ${{ secrets.DEPLOY_DASHBOARD_API_KEY }}
          RUN_ID: ${{ github.run_id }}
          ENVIRONMENT: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
          GIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DOCKER_STATUS: ${{ steps.docker-push.outcome == 'success' && 'success' || 'failure' }}
        run: |
          curl -s --max-time 10 -X POST "$DASHBOARD_URL/api/events" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg run_id "$RUN_ID" \
              --arg service "frontend" \
              --arg environment "$ENVIRONMENT" \
              --arg stage "docker" \
              --arg status "$DOCKER_STATUS" \
              --arg timestamp "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg git_sha "$GIT_SHA" \
              --arg git_branch "$GIT_BRANCH" \
              --arg git_message "$GIT_MESSAGE" \
              --arg github_run_url "$RUN_URL" \
              '{run_id:$run_id,service:$service,environment:$environment,stage:$stage,status:$status,timestamp:$timestamp,git_sha:$git_sha,git_branch:$git_branch,git_message:$git_message,details:{github_run_url:$github_run_url}}')"
